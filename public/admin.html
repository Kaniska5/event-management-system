<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Training Management System</title>
  <meta name="description" content="Admin panel to create and manage training events for the Training Management System." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">📋</div>
      <div class="brand-text">
        <span class="brand-title">TrainingHub</span>
        <span class="brand-sub">Event Management System</span>
      </div>
    </div>
    <nav class="header-nav">
      <a href="index.html" class="nav-link" id="nav-events">Events</a>
      <a href="admin.html" class="nav-link active" id="nav-admin">Admin Panel</a>
    </nav>
  </header>

  <!-- ── Toast Container ────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ── Main Content ───────────────────────────────────────────── -->
  <main class="page-wrapper">

    <!-- Page Heading -->
    <div class="page-header">
      <h1 class="page-title">Admin Panel</h1>
      <p class="page-subtitle">Create new training events and monitor all registrations.</p>
    </div>

    <div class="admin-grid">

      <!-- ── Left: Create Event Form ─────────────────────────── -->
      <div class="panel">
        <div class="panel-title">
          <span>➕</span> Create New Event
        </div>

        <form id="create-event-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="event-title">Event Title <span>*</span></label>
            <input
              type="text"
              id="event-title"
              class="input-lg"
              placeholder="e.g. Leadership Workshop"
              required
              maxlength="100"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="event-date">Event Date <span>*</span></label>
            <input
              type="date"
              id="event-date"
              class="input-lg"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="event-location">Location <span>*</span></label>
            <input
              type="text"
              id="event-location"
              class="input-lg"
              placeholder="e.g. Conference Hall A"
              required
              maxlength="100"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="event-capacity">Max Capacity <span>*</span></label>
            <input
              type="number"
              id="event-capacity"
              class="input-lg"
              placeholder="e.g. 50"
              min="1"
              max="1000"
              required
            />
          </div>

          <button type="submit" id="create-btn" class="btn btn-primary btn-full">
            Create Event
          </button>

        </form>
      </div>

      <!-- ── Right: All Events Table ─────────────────────────── -->
      <div class="panel">
        <div class="panel-title">
          <span>📅</span> All Events
          <span id="admin-event-count" style="margin-left:auto;font-size:13px;font-weight:400;color:var(--text-light);"></span>
        </div>

        <div class="table-wrap">
          <table class="data-table" id="admin-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Date</th>
                <th>Location</th>
                <th>Capacity</th>
                <th>Registered</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="admin-table-body">
              <!-- Populated dynamically -->
            </tbody>
          </table>
        </div>

        <!-- Empty state if no events -->
        <div class="empty-state" id="admin-empty" style="display:none;">
          <h3>No events yet</h3>
          <p>Create your first event using the form.</p>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
